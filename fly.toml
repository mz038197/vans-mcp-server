# Fly.io — see docs/deploy-fly.md
app = "vans-mcp-server"
primary_region = "sin"

[build]

[env]
  PUBLIC_URL = "https://mcp.vanscoding.com"
  # Classroom Discord server id (right-click server → Copy Server ID with Developer Mode).
  # DISCORD_GUILD_ID = "123456789012345678"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
